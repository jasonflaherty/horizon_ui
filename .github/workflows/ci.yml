name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve workspace
        run: dart pub get

      - name: Format
        run: dart format --set-exit-if-changed packages examples

      - name: Analyze
        run: |
          dart analyze --fatal-infos packages/horizon_ui
          dart analyze --fatal-infos examples/gallery
          dart analyze --fatal-infos examples/showcase

      - name: Test
        working-directory: packages/horizon_ui
        run: flutter test

      - name: Publish dry-run
        working-directory: packages/horizon_ui
        run: dart pub publish --dry-run
