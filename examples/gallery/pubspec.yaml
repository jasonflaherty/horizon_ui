name: gallery
description: Horizon UI Widgetbook gallery
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.10.0
  flutter: ">=3.32.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  horizon_ui:
    path: ../../packages/horizon_ui
  widgetbook: ^3.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  web:
    generate: true
  macos:
    generate: true
  image_path: ../../assets/branding/horizon-ui-icon.png
